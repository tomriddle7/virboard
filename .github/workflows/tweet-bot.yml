name: Virboard Auto Twitter Bot

on:
  schedule:
    # 예: 매시간 정각에 실행되도록 크론(CRON) 설정
    # - cron: '21 6,14,22 * * *' 
  workflow_dispatch: # 수동으로도 실행할 수 있도록 버튼 활성화

jobs:
  tweet_promo:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 불러오기
        uses: actions/checkout@v3

      - name: Node.js 환경 세팅
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 패키지 설치
        run: npm install twitter-api-v2

      - name: 자동 트윗 스크립트 실행
        env:
          # 트위터 API 및 구글 시트 접근을 위한 환경 변수 세팅
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          GOOGLE_SHEET_API_URL: ${{ secrets.GOOGLE_SHEET_API_URL }} # 배포된 GAS 웹앱 URL
        run: |
          node scripts/fetch-events.js
          node scripts/bot.js
        # tweetBot.js 내부는 시트 데이터를 읽고 -> X에 포스팅하고 -> 성공 시 GAS에 updateTweetStatus 액션을 POST 하는 로직으로 구성됩니다.