name: Update Data and Deploy to GitHub Pages

on:
  schedule:
    - cron: '32 5,11,17,23 * * *' # 매일 한국시간 3시, 9시, 15시, 21시가 되기 28분 전 실행
  workflow_dispatch: # 수동 실행 버튼
    inputs:
      deploy_only:
        description: 'Only Deploy Code(Omit Data Fetching)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    env:
      VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}
      VITE_GAS_URL: ${{ secrets.VITE_GAS_URL }}
      VITE_EVENT_SHEET_URL: ${{ secrets.VITE_EVENT_SHEET_URL }}
      VITE_VTUBER_SHEET_URL: ${{ secrets.VITE_VTUBER_SHEET_URL }}
      VITE_PLATFORM_SHEET_URL: ${{ secrets.VITE_PLATFORM_SHEET_URL }}

    steps:
      # 1. 저장소 체크아웃
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # 2. Node.js 세팅
      - name: Node.js 세팅
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # 3. 프로젝트 패키지 설치
      - name: 패키지 설치 (npm install)
        run: npm install

      # 4. 구글 시트 데이터 Fetch 
      # ✨ 수동 배포(deploy_only) 체크박스를 켰다면 이 단계는 건너뜁니다.
      - name: 구글 시트 데이터 Fetch 및 JSON 변환
        run: node scripts/fetch-events.js

      # 5. 변경 사항 확인 및 커밋
      # ✨ 변경 사항이 있는지 없는지 깃허브에게(has_changes) 몰래 알려줍니다.
      - name: 변경된 JSON 파일 커밋 및 푸시
        id: git_commit
        if: ${{ !inputs.deploy_only }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/celebration.json
          git add public/vtubers.json
          
          if ! git diff --cached --quiet; then
            echo "변경사항이 감지되었습니다. 커밋을 진행합니다."
            git commit -m "chore: 📅 구글 시트 일정 데이터 자동 동기화"
            git pull origin main --rebase --autostash
            git push origin main
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "구글 시트에 새로운 변경사항이 없습니다. 커밋을 건너뜁니다."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      # 6. React 프로젝트 빌드
      # ✨ 조건: 수동 배포를 눌렀거나 OR 수동 실행이거나 OR 데이터가 변경되었을 때만 빌드!
      - name: 프로젝트 빌드 (npm run build)
        if: ${{ inputs.deploy_only || github.event_name == 'workflow_dispatch' || steps.git_commit.outputs.has_changes == 'true' }}
        run: npm run build

      # 7. GitHub Pages 배포
      - name: GitHub Pages로 배포
        if: ${{ inputs.deploy_only || github.event_name == 'workflow_dispatch' || steps.git_commit.outputs.has_changes == 'true' }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: virboard.me