name: Update Calendar Data from Google Sheets

# 언제 이 작업(Job)을 실행할지 결정합니다.
on:
  schedule:
    # 🕒 매일 자정 (한국 시간 KST 00:00 = 협정 세계시 UTC 15:00)
    - cron: '0 15 * * *'
  workflow_dispatch: 
    # 👆 수동으로 실행하고 싶을 때 GitHub 사이트에서 버튼을 누를 수 있게 해줍니다.

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 리포지토리에 코드를 푸시할 권한을 부여합니다.

    steps:
      # 1. 내 깃허브 저장소의 코드를 가져옵니다.
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      # 2. Node.js 환경을 세팅합니다.
      - name: Node.js 세팅
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 구글 시트에서 데이터를 가져오는 스크립트를 실행합니다.
      - name: 구글 시트 데이터 Fetch 및 JSON 변환
        run: node scripts/fetch-events.js

      # 4. JSON 파일에 변경 사항이 생겼는지 확인하고 커밋합니다.
      - name: 변경된 JSON 파일 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/celebration.json
          
          # 변경사항이 없으면 오류 없이 넘어가고, 변경사항이 있으면 커밋합니다.
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: 📅 구글 시트 일정 데이터 자동 동기화"
          git push origin main